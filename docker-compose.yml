# =============================================================================
# docker-compose.yml — Ly-ion backend stack: Flask + PostgreSQL + Nginx
# Usage: docker-compose up -d
# =============================================================================
version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     lyion
      POSTGRES_PASSWORD: lyion_pass
      POSTGRES_DB:       lyion_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./lyion_backend/migration.sql:/docker-entrypoint-initdb.d/01_migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyion -d lyion_db"]
      interval: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Flask backend (Gunicorn)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./lyion_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./lyion_backend/.env
    environment:
      DATABASE_URL: postgresql://lyion:lyion_pass@db:5432/lyion_db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy (terminates TLS, forwards to Flask)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro   # Mount your TLS certificates here
    depends_on:
      - backend

volumes:
  pgdata:
